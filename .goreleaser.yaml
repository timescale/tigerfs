version: 2

project_name: tigerfs

before:
  hooks:
    - go mod tidy

builds:
  - id: tigerfs
    main: ./cmd/tigerfs
    binary: tigerfs
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/timescale/tigerfs/internal/tigerfs/cmd.Version={{.Version}}
      - -X github.com/timescale/tigerfs/internal/tigerfs/cmd.BuildTime={{.Date}}
      - -X github.com/timescale/tigerfs/internal/tigerfs/cmd.GitCommit={{.Commit}}

archives:
  - id: archive
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - docs/spec.md

checksum:
  split: true

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  github:
    owner: timescale
    name: tigerfs
  draft: false
  prerelease: auto

blobs:
  # Versioned release artifacts
  - provider: s3
    bucket: tigerfs-releases
    region: us-east-1
    directory: "releases/{{ .Tag }}"
    ids:
      - archive
