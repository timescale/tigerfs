services:
  postgres:
    image: timescale/timescaledb-ha:pg18
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 2s
      timeout: 5s
      retries: 10

  tigerfs:
    build:
      context: ../..
      dockerfile: scripts/docker-demo/Dockerfile
    privileged: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: demo
      PGPASSWORD: demo
      PGDATABASE: demo
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    stdin_open: true
    tty: true
