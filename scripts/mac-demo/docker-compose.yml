# PostgreSQL container for macOS demo
# TigerFS runs natively on macOS, only PostgreSQL is in Docker

services:
  postgres:
    image: timescale/timescaledb-ha:pg18
    container_name: tigerfs-demo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    volumes:
      - ../docker-demo/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 2s
      timeout: 5s
      retries: 10
